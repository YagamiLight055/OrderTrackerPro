name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare Deployment Artifacts
        run: |
          # 1. Handle SPA Routing fallback for GitHub Pages
          # This allows page refreshes on sub-routes to work
          cp dist/index.html dist/404.html
          
          # 2. Ensure PWA assets are moved to dist
          # Vite doesn't copy root-level assets automatically if they aren't in /public
          [ -f sw.js ] && cp sw.js dist/ || echo "sw.js not found in root"
          [ -f manifest.json ] && cp manifest.json dist/ || echo "manifest.json not found in root"
          
          # 3. List dist contents for verification
          echo "Build artifacts in dist/:"
          ls -R dist

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
